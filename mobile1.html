<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Schedule</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Schedule"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <meta name="theme-color" content="#18180f"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f2f1ec;--surface:#fff;--surface2:#e8e7e1;
      --border:rgba(0,0,0,.08);--text:#18180f;--text2:#5a5a50;--text3:#9a9a8e;
      --font:'Sora',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
    }
    html,body{height:100%;overflow:hidden}
    body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;flex-direction:column}

    /* ── Header ── */
    .header{padding:12px 16px 8px;background:var(--bg);flex-shrink:0}
    .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .header-title{font-size:16px;font-weight:700;letter-spacing:-.3px}
    .header-date{font-size:11px;font-weight:600;color:#791f1f;background:#fff0f0;border:1px solid rgba(163,45,45,.2);border-radius:6px;padding:4px 10px;font-family:var(--mono)}

    /* ── Day pills ── */
    .day-row{display:flex;gap:5px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
    .day-row::-webkit-scrollbar{display:none}
    .day-pill{flex-shrink:0;padding:5px 12px;border-radius:999px;font-size:12px;font-weight:600;cursor:pointer;border:.5px solid rgba(0,0,0,.12);background:var(--surface);color:var(--text2);transition:all .15s;user-select:none;text-align:center}
    .day-pill.active{background:#18180f;color:#fff;border-color:#18180f}
    .day-pill.today-pill{border-color:#378add;color:#1d6fc4}
    .day-pill.today-pill.active{background:#1d6fc4;color:#fff;border-color:#1d6fc4}

    /* ── Tabs ── */
    .tabs{display:flex;border-bottom:.5px solid var(--border);background:var(--surface);flex-shrink:0}
    .tab{flex:1;padding:8px 4px;font-size:11px;font-weight:600;color:var(--text3);text-align:center;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
    .tab.active{color:var(--text);border-bottom-color:#18180f}

    /* ── Scroll area ── */
    .scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 12px 20px}

    /* ── Schedule view ── */
    .shift-row{background:var(--surface);border-radius:10px;margin-bottom:7px;overflow:hidden;border:.5px solid var(--border)}
    .shift-head{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:.5px solid var(--border)}
    .shift-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .shift-info{flex:1}
    .shift-name{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
    .shift-time{font-size:12px;font-weight:700;color:var(--text);font-family:var(--mono)}
    .shift-body{padding:8px 12px;display:flex;flex-wrap:wrap;gap:5px}
    .shift-empty{padding:8px 12px;font-size:12px;color:var(--text3);font-style:italic}

    /* badges */
    .badge{display:inline-block;font-size:12px;font-weight:600;padding:4px 11px;border-radius:6px;white-space:nowrap}
    .b-purple{background:#7c3aed;color:#fff}.b-blue{background:#1d6fc4;color:#fff}
    .b-rose{background:#9f1239;color:#fff}.b-pink{background:#c4256e;color:#fff}
    .b-orange{background:#c2540a;color:#fff}.b-green{background:#16803c;color:#fff}
    .b-cyan{background:#0e7490;color:#fff}.b-red{background:#c42020;color:#fff}
    .b-teal{background:#0d6e5e;color:#fff}.b-brown{background:#7c3400;color:#fff}
    .b-lime{background:#4a7c10;color:#fff}.b-indigo{background:#3730a3;color:#fff}
    .b-fsd{background:var(--surface2);color:var(--text2)}

    /* ── Contacts view ── */
    .contact-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:.5px solid var(--border)}
    .contact-row:last-child{border-bottom:none}
    .av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
    .contact-name{font-size:13px;font-weight:600;color:var(--text);flex:1}
    .call-btn{display:flex;align-items:center;gap:5px;background:#f0fef4;color:#16803c;border:.5px solid rgba(22,128,60,.25);border-radius:6px;padding:5px 10px;font-size:12px;font-weight:600;font-family:var(--font);text-decoration:none;white-space:nowrap}
    .section-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin:14px 0 6px}
    .section-label:first-child{margin-top:0}
    .sup-row{display:flex;align-items:center;justify-content:space-between;background:#fff8e0;border-radius:8px;padding:8px 12px;margin-bottom:6px}
    .sup-name{font-size:13px;font-weight:700;color:#7a4a00}
    .sup-call{display:flex;align-items:center;gap:5px;background:#fff3cd;color:#7a4a00;border:.5px solid rgba(122,74,0,.2);border-radius:6px;padding:5px 10px;font-size:12px;font-weight:600;font-family:var(--font);text-decoration:none}

    /* ── Breaks view ── */
    .break-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:.5px solid var(--border)}
    .break-row:last-of-type{border-bottom:none}
    .break-name{font-size:12px;color:var(--text2)}
    .break-time{font-size:12px;font-weight:600;color:var(--text);font-family:var(--mono)}
    .break-note{margin-top:10px;background:#daf2de;border-radius:8px;padding:8px 12px;font-size:12px;color:#1e5c28;font-weight:600;text-align:center}

    /* loading */
    .loading{text-align:center;padding:2rem;color:var(--text3);font-size:13px}
  </style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="header-title">🛡️ Security Schedule</div>
    <div class="header-date" id="dateLabel"></div>
  </div>
  <div class="day-row" id="dayRow"></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchView('schedule')">📅 Schedule</div>
  <div class="tab" onclick="switchView('contacts')">📞 Contacts</div>
  <div class="tab" onclick="switchView('breaks')">☕ Breaks</div>
</div>

<div class="scroll-area" id="scrollArea">
  <div class="loading">Loading...</div>
</div>

<script>
const DAYS_SHORT = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const DAYS_FULL  = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const MASTER_KEY = '$2a$10$yL7ht7nVnUIXe4e/qGTpg.kXULfxRdguRyfVofbdsJ.iR5552oiwO';
const BIN_ID     = '69befca1b7ec241ddc8d494c';

let state = {
  employees:[
    {name:'Brandon',color:'b-purple'},{name:'Kevin',color:'b-blue'},
    {name:'Heming',color:'b-rose'},{name:'Jose',color:'b-pink'},
    {name:'Tai',color:'b-orange'},{name:'Yaran',color:'b-green'},
    {name:'Ivan',color:'b-cyan'},{name:'Desmond',color:'b-red'},
    {name:'Marco',color:'b-teal'},{name:'Jorge',color:'b-brown'},
    {name:'Alan',color:'b-lime'},{name:'Edward',color:'b-indigo'},
    {name:'RAM',color:'b-fsd'},
  ],
  shifts:[
    {key:'morning',  label:'Morning shift',  time:'7:30 AM → 3:30 PM', color:'#378add'},
    {key:'mid',      label:'Mid shift',      time:'10:00 AM → 7:00 PM',color:'#ba7517'},
    {key:'afternoon',label:'Afternoon shift',time:'3:30 PM → 11:30 PM',color:'#639922'},
    {key:'overnight',label:'Overnight shift',time:'11:30 PM → 7:30 AM',color:'#7f77dd'},
    {key:'fsd',      label:'FSD',            time:'8:30 AM → 5:30 PM', color:'#888'},
  ],
  contacts:[
    {name:'Marco',phone:'347-318-7384'},{name:'Heming',phone:'646-287-3129'},
    {name:'Edward',phone:'646-251-3682'},{name:'Yaran',phone:'929-509-9885'},
    {name:'Desmond',phone:'929-415-6106'},{name:'Jorge',phone:'407-255-3854'},
    {name:'Jose',phone:'929-346-1123'},{name:'Alan',phone:'347-231-9009'},
    {name:'Ivan',phone:'917-741-2543'},{name:'Kevin',phone:'347-867-6403'},
    {name:'Brandon',phone:'347-339-0800'},{name:'Tai',phone:'201-212-9356'},
  ],
  supervisors:[
    {name:'Fanny',phone:'347-656-0600'},
    {name:'RAM',phone:'516-499-2311'},
    {name:'Andy',phone:'347-222-8880'},
  ],
  schedule:{
    morning:  ['Brandon, Kevin','Jose, Kevin','Kevin, Heming','Heming, Brandon','Brandon, Jose, Tai','Jose, Tai','Brandon, Tai'],
    mid:      ['Heming','Heming','Brandon','Kevin','Heming','Kevin','Heming'],
    afternoon:['Tai, Yaran','Yaran, Ivan','Yaran, Ivan','Desmond, Yaran','Ivan, Yaran','Ivan, Desmond','Yaran, Ivan'],
    overnight:['Marco, Desmond','Jorge, Marco','Alan, Marco','Marco, Jorge','Jorge, Desmond','Jose, Jorge','Jorge, Marco'],
    fsd:      ['RAM','RAM','RAM','RAM','RAM','',''],
  }
};

const COLOR_BG = {
  'b-purple':'#7c3aed','b-blue':'#1d6fc4','b-rose':'#9f1239','b-pink':'#c4256e',
  'b-orange':'#c2540a','b-green':'#16803c','b-cyan':'#0e7490','b-red':'#c42020',
  'b-teal':'#0d6e5e','b-brown':'#7c3400','b-lime':'#4a7c10','b-indigo':'#3730a3',
  'b-fsd':'#888'
};

let selectedDay = (new Date().getDay()+6)%7;
let currentView = 'schedule';

function colorFor(name){
  const e=state.employees.find(e=>e.name.trim()===name.trim());
  return e?e.color:'b-fsd';
}
function colorBg(key){ return COLOR_BG[key]||'#888'; }
function avatarBg(name){
  const e=state.employees.find(e=>e.name===name);
  const bg=e?colorBg(e.color):'#888';
  return `background:${bg}22;color:${bg}`;
}
function namesHtml(str){
  if(!str||!str.trim()) return '';
  return str.split(',').map(n=>n.trim()).filter(Boolean)
    .map(n=>`<span class="badge ${colorFor(n)}">${n}</span>`).join('');
}

// Header date
function renderHeader(){
  const now=new Date();
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('dateLabel').textContent=
    `${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
}

// Day pills
function renderDayRow(){
  const today=(new Date().getDay()+6)%7;
  document.getElementById('dayRow').innerHTML=DAYS_SHORT.map((d,i)=>`
    <div class="day-pill${i===selectedDay?' active':''}${i===today?' today-pill':''}"
      onclick="selectDay(${i})">${d}${i===today?'<br><span style="font-size:9px;opacity:.7">Today</span>':''}</div>
  `).join('');
}

function selectDay(i){
  selectedDay=i;
  renderDayRow();
  renderView();
  document.getElementById('scrollArea').scrollTop=0;
}

// Tab switch
function switchView(v){
  currentView=v;
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active',['schedule','contacts','breaks'][i]===v);
  });
  renderView();
  document.getElementById('scrollArea').scrollTop=0;
}

function renderView(){
  if(currentView==='schedule') renderSchedule();
  else if(currentView==='contacts') renderContacts();
  else renderBreaks();
}

function renderSchedule(){
  const di=selectedDay;
  document.getElementById('scrollArea').innerHTML=state.shifts.map(s=>{
    const names=state.schedule[s.key]?.[di]||'';
    return `<div class="shift-row">
      <div class="shift-head">
        <div class="shift-dot" style="background:${s.color}"></div>
        <div class="shift-info">
          <div class="shift-name">${s.label}</div>
          <div class="shift-time">${s.time}</div>
        </div>
      </div>
      ${names.trim()
        ?`<div class="shift-body">${namesHtml(names)}</div>`
        :`<div class="shift-empty">No one scheduled</div>`}
    </div>`;
  }).join('');
}

function renderContacts(){
  const contactsHtml=state.contacts.map(c=>`
    <div class="contact-row">
      <div class="av" style="${avatarBg(c.name)}">${c.name.slice(0,2)}</div>
      <span class="contact-name">${c.name}</span>
      <a class="call-btn" href="tel:${c.phone.replace(/\D/g,'')}">📞 ${c.phone}</a>
    </div>`).join('');

  const supsHtml=state.supervisors.map(s=>`
    <div class="sup-row">
      <span class="sup-name">${s.name}</span>
      <a class="sup-call" href="tel:${s.phone.replace(/\D/g,'')}">📞 ${s.phone}</a>
    </div>`).join('');

  document.getElementById('scrollArea').innerHTML=`
    <div class="section-label">Staff</div>
    ${contactsHtml}
    <div class="section-label">Supervisors</div>
    ${supsHtml}`;
}

function renderBreaks(){
  const breaks=[
    {name:'Morning shift', time:'11:30 PM – 12:00 PM'},
    {name:'Morning shift', time:'12:15 PM – 12:45 PM'},
    {name:'Afternoon shift',time:'2:00 PM – 2:30 PM'},
    {name:'Evening shift',  time:'5:00 PM – 5:30 PM'},
    {name:'Evening shift',  time:'5:45 PM – 6:15 PM'},
    {name:'Overnight shift',time:'2:00 AM – 2:30 AM'},
    {name:'Overnight shift',time:'3:15 AM – 3:45 AM'},
  ];
  document.getElementById('scrollArea').innerHTML=`
    ${breaks.map(b=>`
      <div class="break-row">
        <span class="break-name">${b.name}</span>
        <span class="break-time">${b.time}</span>
      </div>`).join('')}
    <div class="break-note">30 min mandatory lunch break per shift</div>`;
}

async function loadFromCloud(){
  try{
    const res=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`,{headers:{'X-Master-Key':MASTER_KEY}});
    if(!res.ok) throw new Error();
    const data=await res.json();
    if(data&&data.record&&data.record.schedule) state=data.record;
  }catch(e){ console.log('Using default data'); }
  renderHeader();
  renderDayRow();
  renderView();
}

loadFromCloud();

// Redirect desktop users to full version
if(!/Mobi|Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)){
  window.location.replace('index.html');
}
</script>

<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('service-worker.js');
}
</script>
</body>
</html>
