<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Schedule</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Schedule"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <meta name="theme-color" content="#18180f"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f2f1ec;--surface:#fff;--surface2:#e8e7e1;
      --border:rgba(0,0,0,.07);--text:#18180f;--text2:#5a5a50;--text3:#9a9a8e;
      --font:'Sora',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
    }
    html,body{height:100%;overflow:hidden}
    body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;flex-direction:column}
    .header{padding:14px 14px 8px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .header-title{font-size:14px;font-weight:700}
    .date-badge{font-size:10px;font-weight:600;color:#791f1f;background:#fff0f0;border:1px solid rgba(163,45,45,.2);border-radius:5px;padding:3px 7px;font-family:var(--mono)}
    .legend{display:flex;gap:8px;padding:0 14px 8px;flex-wrap:wrap;flex-shrink:0}
    .legend-item{display:flex;align-items:center;gap:3px;font-size:9px;color:var(--text2)}
    .legend-dot{width:8px;height:8px;border-radius:2px;display:inline-block;flex-shrink:0}
    .scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 10px 20px}
    .grid-header{display:grid;grid-template-columns:30px repeat(7,1fr);gap:2px;margin-bottom:2px;position:sticky;top:0;background:var(--bg);z-index:1;padding-bottom:3px}
    .day-label{text-align:center;font-size:9px;font-weight:700;padding:3px 1px;border-radius:5px;color:var(--text3)}
    .day-label.today{background:#18180f;color:#fff}
    .shift-row{display:grid;grid-template-columns:30px repeat(7,1fr);gap:2px;margin-bottom:2px}
    .shift-label{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
    .shift-dot{width:6px;height:6px;border-radius:50%}
    .shift-name{font-size:7px;font-weight:700;color:#888;text-transform:uppercase}
    .shift-cell{background:var(--surface);border-radius:5px;border:.5px solid var(--border);padding:3px 2px;min-height:32px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px}
    .shift-cell.today{background:#eef5ff;border-color:rgba(55,138,221,.2)}
    .name-badge{font-size:8px;font-weight:700;padding:1px 3px;border-radius:3px;color:#fff;text-align:center;white-space:nowrap;width:100%}
    .divider{display:flex;align-items:center;gap:8px;margin:14px 0 10px}
    .divider-line{flex:1;height:.5px;background:rgba(0,0,0,.1)}
    .divider-label{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px}
    .contacts-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
    .contact-card{background:var(--surface);border-radius:8px;border:.5px solid var(--border);padding:7px 8px;display:flex;align-items:center;gap:7px}
    .av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
    .contact-name{font-size:11px;font-weight:600;color:var(--text)}
    .contact-phone{font-size:10px;color:var(--text2);font-family:var(--mono);text-decoration:none}
    .sup-row{background:#fff8e0;border-radius:8px;padding:8px 12px;margin-bottom:5px;display:flex;align-items:center;justify-content:space-between}
    .sup-name{font-size:12px;font-weight:700;color:#7a4a00}
    .sup-phone{font-size:11px;font-weight:600;color:#9a6000;font-family:var(--mono);text-decoration:none}
  </style>
</head>
<body>

<div class="header">
  <div class="header-title">🛡️ Schedule</div>
  <div class="date-badge" id="dateLabel"></div>
</div>

<div class="legend">
  <span class="legend-item"><span class="legend-dot" style="background:#378add"></span>AM 7:30–3:30</span>
  <span class="legend-item"><span class="legend-dot" style="background:#ba7517"></span>Mid 10–7</span>
  <span class="legend-item"><span class="legend-dot" style="background:#639922"></span>PM 3:30–11:30</span>
  <span class="legend-item"><span class="legend-dot" style="background:#7f77dd"></span>Night 11:30–7:30</span>
  <span class="legend-item"><span class="legend-dot" style="background:#888"></span>FSD 8:30–5:30</span>
</div>

<div class="scroll-area">
  <div id="scheduleGrid"></div>

  <div class="divider">
    <div class="divider-line"></div>
    <span class="divider-label">Contacts</span>
    <div class="divider-line"></div>
  </div>
  <div class="contacts-grid" id="contactsList"></div>

  <div class="divider">
    <div class="divider-line"></div>
    <span class="divider-label">Supervisors</span>
    <div class="divider-line"></div>
  </div>
  <div id="supsList"></div>
</div>

<script>
if(!/Mobi|Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)){
  window.location.replace('index.html');
}

const DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const MASTER_KEY='$2a$10$yL7ht7nVnUIXe4e/qGTpg.kXULfxRdguRyfVofbdsJ.iR5552oiwO';
const BIN_ID='69befca1b7ec241ddc8d494c';

let state={
  employees:[
    {name:'Brandon',color:'#7c3aed'},{name:'Kevin',color:'#1d6fc4'},
    {name:'Heming',color:'#9f1239'},{name:'Jose',color:'#c4256e'},
    {name:'Tai',color:'#c2540a'},{name:'Yaran',color:'#16803c'},
    {name:'Ivan',color:'#0e7490'},{name:'Desmond',color:'#c42020'},
    {name:'Marco',color:'#0d6e5e'},{name:'Jorge',color:'#7c3400'},
    {name:'Alan',color:'#4a7c10'},{name:'Edward',color:'#3730a3'},
    {name:'RAM',color:'#888'},
  ],
  shifts:[
    {key:'morning',  label:'AM',    color:'#378add'},
    {key:'mid',      label:'Mid',   color:'#ba7517'},
    {key:'afternoon',label:'PM',    color:'#639922'},
    {key:'overnight',label:'Night', color:'#7f77dd'},
    {key:'fsd',      label:'FSD',   color:'#888'},
  ],
  contacts:[
    {name:'Marco',phone:'347-318-7384'},{name:'Heming',phone:'646-287-3129'},
    {name:'Edward',phone:'646-251-3682'},{name:'Yaran',phone:'929-509-9885'},
    {name:'Desmond',phone:'929-415-6106'},{name:'Jorge',phone:'407-255-3854'},
    {name:'Jose',phone:'929-346-1123'},{name:'Alan',phone:'347-231-9009'},
    {name:'Ivan',phone:'917-741-2543'},{name:'Kevin',phone:'347-867-6403'},
    {name:'Brandon',phone:'347-339-0800'},{name:'Tai',phone:'201-212-9356'},
  ],
  supervisors:[
    {name:'Fanny',phone:'347-656-0600'},
    {name:'RAM',phone:'516-499-2311'},
    {name:'Andy',phone:'347-222-8880'},
  ],
  schedule:{
    morning:  ['Brandon, Kevin','Jose, Kevin','Kevin, Heming','Heming, Brandon','Brandon, Jose, Tai','Jose, Tai','Brandon, Tai'],
    mid:      ['Heming','Heming','Brandon','Kevin','Heming','Kevin','Heming'],
    afternoon:['Tai, Yaran','Yaran, Ivan','Yaran, Ivan','Desmond, Yaran','Ivan, Yaran','Ivan, Desmond','Yaran, Ivan'],
    overnight:['Marco, Desmond','Jorge, Marco','Alan, Marco','Marco, Jorge','Jorge, Desmond','Jose, Jorge','Jorge, Marco'],
    fsd:      ['RAM','RAM','RAM','RAM','RAM','',''],
  }
};

function colorFor(name){
  // support both {color:'#hex'} and {color:'b-class'} formats
  const e=state.employees.find(e=>e.name.trim()===name.trim());
  if(!e) return '#888';
  // if color is a hex value use directly, else map class to hex
  if(e.color.startsWith('#')) return e.color;
  const map={'b-purple':'#7c3aed','b-blue':'#1d6fc4','b-rose':'#9f1239','b-pink':'#c4256e',
    'b-orange':'#c2540a','b-green':'#16803c','b-cyan':'#0e7490','b-red':'#c42020',
    'b-teal':'#0d6e5e','b-brown':'#7c3400','b-lime':'#4a7c10','b-indigo':'#3730a3','b-fsd':'#888'};
  return map[e.color]||'#888';
}

function avatarColor(name){
  return colorFor(name);
}

function renderAll(){
  const today=(new Date().getDay()+6)%7;
  const now=new Date();
  const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('dateLabel').textContent=`${mo[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;

  // Schedule grid
  let html='';
  html+=`<div class="grid-header">`;
  html+=`<div></div>`;
  DAYS.forEach((d,i)=>{
    html+=`<div class="day-label${i===today?' today':''}">${d}</div>`;
  });
  html+=`</div>`;

  state.shifts.forEach(s=>{
    html+=`<div class="shift-row">`;
    html+=`<div class="shift-label">
      <div class="shift-dot" style="background:${s.color}"></div>
      <span class="shift-name">${s.label}</span>
    </div>`;
    for(let i=0;i<7;i++){
      const names=(state.schedule[s.key]||[])[i]||'';
      const list=names.trim()?names.split(',').map(n=>n.trim()).filter(Boolean):[];
      html+=`<div class="shift-cell${i===today?' today':''}">`;
      if(list.length){
        list.forEach(n=>{
          html+=`<div class="name-badge" style="background:${colorFor(n)}">${n}</div>`;
        });
      } else {
        html+=`<span style="font-size:8px;color:#ddd">—</span>`;
      }
      html+=`</div>`;
    }
    html+=`</div>`;
  });
  document.getElementById('scheduleGrid').innerHTML=html;

  // Contacts
  let cHtml='';
  state.contacts.forEach(c=>{
    const bg=avatarColor(c.name);
    cHtml+=`<div class="contact-card">
      <div class="av" style="background:${bg}22;color:${bg}">${c.name.slice(0,2)}</div>
      <div style="min-width:0">
        <div class="contact-name">${c.name}</div>
        <a class="contact-phone" href="tel:${c.phone.replace(/\D/g,'')}">${c.phone}</a>
      </div>
    </div>`;
  });
  document.getElementById('contactsList').innerHTML=cHtml;

  // Supervisors
  let sHtml='';
  state.supervisors.forEach(s=>{
    sHtml+=`<div class="sup-row">
      <span class="sup-name">${s.name}</span>
      <a class="sup-phone" href="tel:${s.phone.replace(/\D/g,'')}">📞 ${s.phone}</a>
    </div>`;
  });
  document.getElementById('supsList').innerHTML=sHtml;
}

async function loadFromCloud(){
  try{
    const res=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`,{headers:{'X-Master-Key':MASTER_KEY}});
    if(!res.ok) throw new Error();
    const data=await res.json();
    if(data&&data.record&&data.record.schedule) state=data.record;
  }catch(e){ console.log('Using default data'); }
  renderAll();
}

loadFromCloud();
</script>

<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('service-worker.js');
}
</script>
</body>
</html>
